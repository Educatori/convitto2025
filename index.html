<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indice</title>
    <style>
        :root {
            --bg-page: #eef7ef; 
            --bg-header: #1a3a5a; 
            --accent-color: #2c3e50;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--bg-header);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 24px;
            border-bottom: 3px solid var(--bg-header);
            padding-bottom: 10px;
            margin: 0;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            max-width: 800px;
            padding: 20px;
        }

        .link-card {
            background: var(--white);
            border: 1px solid #d1d9e0;
            border-radius: 15px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px; /* Ridotto leggermente per centratura migliore */
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(26, 58, 90, 0.2);
            background-color: #f8f9fa;
            border-color: var(--bg-header);
        }

        @media (max-width: 600px) {
            .links-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .link-card {
                width: 120px;
                height: 120px;
            }
        }
        
        .link-card.out {
            opacity: 0.4;
            filter: grayscale(80%);
            pointer-events: none;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div class="header-container">
    <h1>INDICE 2025/26</h1>
</div>

<div class="links-grid">
    <a href="dashboard.html" class="link-card" title="Dashboard Convitto e Dinner">🖥️</a>    
    <a href="roomcloud.html" class="link-row link-card" title="Rooming on Cloud">☁️</a>    
    <a href="bus.html" class="link-row link-card" title="Bus del Mattino">🚌</a>
    <a href="uscita.html" class="link-card" title="Uscita Serale">📋</a>
    <a href="rooming.html" class="link-card" title="Rooming List">🛌</a>
    
    <a href="#" class="link-card out" title="Dinner">🍽️</a>
    <a href="#" class="link-card out" title="Convitto">🏠</a>
    <a href="#" class="link-card out" title="Archivio">📂</a>
    <a href="#" class="link-card out" title="Mappa">📍</a>
    <a href="#" class="link-card out" title="Cerca">🔍</a>
</div>

</body>
</html>
